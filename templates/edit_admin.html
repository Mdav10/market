<!DOCTYPE html>
<html>
<head>
    <title>Edit Admin - MCM Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h4>Edit Admin: {{ admin.username }}</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label>Username</label>
                                <input type="text" name="username" value="{{ admin.username }}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>New Password (leave blank to keep current)</label>
                                <input type="password" name="password" class="form-control">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="is_super" class="form-check-input" {% if admin.is_super_admin %}checked{% endif %}>
                                <label class="form-check-label">Super Admin</label>
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Update Admin</button>
                        </form>
                        <div class="mt-3">
                            <a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
