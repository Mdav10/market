<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - MCM Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { font-size: 16px; }
        body { background: #f5f7fa; }
        .navbar {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            padding: 15px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .navbar-brand { font-size: 1.8rem; font-weight: 700; color: white !important; }
        .form-card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            background: white;
            padding: 35px;
            margin-top: 30px;
        }
        .form-card h3 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }
        .form-label {
            font-weight: 600;
            font-size: 1.1rem;
            color: #555;
        }
        .form-control, .form-select {
            border-radius: 15px;
            padding: 14px 20px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.15);
        }
        .form-control-file {
            border: 2px dashed #e0e0e0;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .form-control-file:hover {
            border-color: #28a745;
            background: #f8fff8;
        }
        .btn-submit {
            border-radius: 15px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.3);
        }
        .image-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 15px;
            margin-top: 15px;
            display: none;
        }
        .required::after {
            content: " *";
            color: red;
            font-weight: 700;
        }
        @media (max-width: 768px) {
            .form-card { padding: 20px; margin-top: 15px; }
            .form-card h3 { font-size: 1.4rem; }
            .form-control, .form-select { font-size: 1rem; padding: 12px 16px; }
            .navbar-brand { font-size: 1.4rem; }
        }
        @media (max-width: 480px) {
            .form-card { padding: 15px; }
            .form-control-file { padding: 20px; }
            .btn-submit { font-size: 1rem; padding: 14px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-plus-circle me-2"></i>Add Product
            </span>
            <a href="{{ url_for('seller_dashboard') }}" class="btn btn-outline-light">
                <i class="bi bi-arrow-left me-1"></i> Dashboard
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <h3 class="mb-4">
                        <i class="bi bi-box-seam text-success me-2"></i>Upload New Product
                    </h3>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    <i class="bi bi-{% if category == 'success' %}check-circle{% else %}exclamation-circle{% endif %} me-2"></i>
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label required">Product Name</label>
                                <input type="text" name="name" class="form-control" placeholder="Enter product name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label required">Price (FCFA)</label>
                                <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Describe your product..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label required">Location</label>
                                <input type="text" name="location" class="form-control" placeholder="City, Area" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select name="category" class="form-select">
                                    <option value="">Select Category</option>
                                    <option value="Electronics">📱 Electronics</option>
                                    <option value="Fashion">👗 Fashion</option>
                                    <option value="Food">🍕 Food</option>
                                    <option value="Services">💼 Services</option>
                                    <option value="Vehicles">🚗 Vehicles</option>
                                    <option value="Real Estate">🏠 Real Estate</option>
                                    <option value="Other">📦 Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Product Image</label>
                            <div class="form-control-file" onclick="document.getElementById('imageInput').click()">
                                <i class="bi bi-cloud-upload" style="font-size:3rem; color:#28a745;"></i>
                                <p class="mt-2 mb-0"><strong>Click to upload image</strong></p>
                                <p class="text-muted small">PNG, JPG, JPEG, GIF, WEBP (Max 16MB)</p>
                                <input type="file" name="image" id="imageInput" class="d-none" accept="image/*" onchange="previewImage(event)">
                            </div>
                            <img id="imagePreview" class="image-preview" alt="Preview">
                        </div>

                        <button type="submit" class="btn btn-submit text-white w-100">
                            <i class="bi bi-cloud-upload me-2"></i>Upload Product
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function previewImage(event) {
            const preview = document.getElementById('imagePreview');
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
