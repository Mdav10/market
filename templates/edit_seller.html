<!DOCTYPE html>
<html>
<head>
    <title>Edit Seller - MCM Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h4>Edit Seller: {{ seller.shop_name }}</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label>Shop Name</label>
                                <input type="text" name="shop_name" value="{{ seller.shop_name }}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>WhatsApp Number</label>
                                <input type="text" name="whatsapp" value="{{ seller.whatsapp_number }}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" name="email" value="{{ seller.email }}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label>New Password (leave blank to keep current)</label>
                                <input type="password" name="password" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Update Seller</button>
                        </form>
                        <div class="mt-3">
                            <a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
