<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MCM Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-size: 18px;
        }
        .login-card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            background: white;
        }
        .login-card h2 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #333;
        }
        .login-card .subtitle {
            font-size: 1.1rem;
            color: #666;
        }
        .form-control {
            border-radius: 15px;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            border-radius: 15px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .role-option {
            flex: 1;
            padding: 15px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .role-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .role-option.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .role-option i {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }
        .back-link {
            color: #667eea;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 15px;
            font-size: 1.1rem;
            padding: 16px;
        }
        @media (max-width: 768px) {
            .login-card {
                padding: 25px;
                margin: 15px;
            }
            .login-card h2 {
                font-size: 1.8rem;
            }
            .role-selector {
                flex-direction: column;
                gap: 10px;
            }
            .role-option {
                padding: 12px;
                font-size: 1rem;
            }
            .form-control {
                padding: 14px 16px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="login-card">
                    <div class="text-center mb-4">
                        <h2>🛒 MCM Market</h2>
                        <p class="subtitle">Welcome back! Login to your account</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    <i class="bi bi-{% if category == 'success' %}check-circle{% elif category == 'danger' %}x-circle{% else %}info-circle{% endif %} me-2"></i>
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="role-selector">
                            <div class="role-option active" data-role="seller" onclick="selectRole('seller')">
                                <i class="bi bi-person-badge"></i>
                                Seller
                            </div>
                            <div class="role-option" data-role="admin" onclick="selectRole('admin')">
                                <i class="bi bi-shield-lock"></i>
                                Admin
                            </div>
                        </div>

                        <input type="hidden" name="role" id="selectedRole" value="seller">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0 rounded-start-3"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0 rounded-start-3"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-login text-white w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{{ url_for('index') }}" class="back-link">
                            <i class="bi bi-arrow-left"></i> Back to Market
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function selectRole(role) {
            // Update active class
            document.querySelectorAll('.role-option').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`[data-role="${role}"]`).classList.add('active');
            
            // Update hidden input
            document.getElementById('selectedRole').value = role;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
