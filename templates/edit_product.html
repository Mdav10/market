<!DOCTYPE html>
<html>
<head>
    <title>Edit Product - MCM Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <span class="navbar-brand">🏪 {{ seller.shop_name }}</span>
            <a href="{{ url_for('seller_dashboard') }}" class="btn btn-light">← Dashboard</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h4>Edit Product</h4>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label>Product Name *</label>
                                <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Description</label>
                                <textarea name="description" class="form-control" rows="3">{{ product.description }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label>Price (FCFA) *</label>
                                <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Location *</label>
                                <input type="text" name="location" value="{{ product.location }}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Category</label>
                                <select name="category" class="form-control">
                                    <option value="">Select Category</option>
                                    <option value="Electronics" {% if product.category == 'Electronics' %}selected{% endif %}>Electronics</option>
                                    <option value="Fashion" {% if product.category == 'Fashion' %}selected{% endif %}>Fashion</option>
                                    <option value="Food" {% if product.category == 'Food' %}selected{% endif %}>Food</option>
                                    <option value="Services" {% if product.category == 'Services' %}selected{% endif %}>Services</option>
                                    <option value="Other" {% if product.category == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="is_available" class="form-check-input" {% if product.is_available %}checked{% endif %}>
                                <label class="form-check-label">Available</label>
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Update Product</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
